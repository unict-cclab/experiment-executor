name: network-aware-scheduler
runs: 1

commands:
  proxmoxK3s: proxmox-k3s
  kubectl: kubectl
  helm: helm
  chaosInjector: /opt/experiment-executor/bin/chaos-injector
  loadGen: load-gen

lifecycle:
  cluster: reuse
tools:
  proxmoxK3s:
    applicationPool:
      namePrefix: app
      defaults:
        template: ubuntu-24.04-template
        proxmoxNode: pve
        storage: zfs-pool
        diskSize: 40
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnetMask: 24
      zones:
        - name: zone-a
          count: 2
          ipStart: 192.168.1.65
          cores: 4
          memory: 16384
        - name: zone-b
          count: 2
          ipStart: 192.168.1.67
          cores: 4
          memory: 16384
    config:
      ssh_key_path: /tmp/.proxmox-k3s/id_ed25519
      proxmox:
        api_url: https://192.168.1.52:8006/api2/json
        token_id: root@pam!am
        token_secret: REDACTED
        insecure_tls: true

      template:
        name: ubuntu-24.04-template
        proxmox_node: pve
        storage: zfs-pool
        image_storage: local
        os: ubuntu-24.04
        bridge: vmbr0
        ip: 192.168.1.60
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnet_mask: 24
        clone_parallelism: 1

      registry:
        vm:
          name: harbor
          proxmox_node: pve
          cores: 4
          memory: 8192
          disk_size: 80
          ip: 192.168.1.61
          gateway: 192.168.1.254
          dns: 208.67.222.222
          subnet_mask: 24
        harbor:
          hostname: 192.168.1.61
          admin_password: Harbor12345
          data_volume: /data
          http_port: 80

      nfs:
        vm:
          name: nfs-server
          proxmox_node: pve
          cores: 2
          memory: 2048
          disk_size: 100
          ip: 192.168.1.62
          gateway: 192.168.1.254
          dns: 208.67.222.222
          subnet_mask: 24
        data_dir: /data/nfs
        export_subnet: 192.168.1.0/24

      clusters:
        - name: ctx-cluster-01
          kubeconfig_path: ../../../kubeconfig-ctx-cluster-01
          pod_cidr: 10.42.0.0/16
          service_cidr: 10.43.0.0/16
          k3s:
            version: v1.36.0+k3s1
            extra_server_args: "--disable=traefik --disable=servicelb"
          addons:
            cilium:
              enabled: false
            monitoring:
              enabled: true
              prometheus_node_port: 32090
              grafana_node_port: 32000
              grafana_admin_password: "admin"
            cluster_lens:
              enabled: true
            logging:
              enabled: true
              retention: 1d
            istio:
              enabled: true
            jaeger:
              enabled: true
              storage_class: local-path
              storage_size: 10Gi
            registry:
              hostname: 192.168.1.61
              http_port: 80
            nfs:
              enabled: true
              server: 192.168.1.62
              data_dir: /data/nfs
            chaos_mesh:
              enabled: true
            mon_agent:
              enabled: true
              scrape_period_seconds: 30
              promql_range: 5m
            mentat:
              enabled: true
              sleep_seconds: 5

          control_plane:
            - name: cp-01
              template: ubuntu-24.04-template
              proxmox_node: pve
              cores: 2
              memory: 4096
              disk_size: 40
              storage: zfs-pool
              ip: 192.168.1.63
              gateway: 192.168.1.254
              dns: 208.67.222.222
              subnet_mask: 24

          workers:
            - name: management
              template: ubuntu-24.04-template
              proxmox_node: pve
              cores: 4
              memory: 16384
              disk_size: 40
              storage: zfs-pool
              ip: 192.168.1.64
              gateway: 192.168.1.254
              dns: 208.67.222.222
              subnet_mask: 24
              labels:
                - nodepool=management
                - topology.kubernetes.io/zone=zone-a
              taints:
                - ManagementOnly=true:NoSchedule

  schedulerPlugins:
    enabled: false
    chart: /opt/experiment-executor/charts/scheduler-plugins
    release: scheduler-plugins
    namespace: scheduler-plugins
    values:
      scheduler:
        name: scheduler-plugins-scheduler
        image: ghcr.io/unict-cclab/kube-scheduler:sophos-v0.2.7
        replicaCount: 1
        leaderElect: false
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                - key: nodepool
                  operator: In
                  values:
                  - management
        tolerations: []
      controller:
        name: scheduler-plugins-controller
        image: registry.k8s.io/scheduler-plugins/controller:v0.29.7
        replicaCount: 1 
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                - key: nodepool
                  operator: In
                  values:
                  - management
        tolerations: []
      plugins:
        enabled:
          #- NetworkAware
          - LoadAwareResourcesBalancedAllocation
        disabled: []
      pluginConfig: []

  descheduler:
    enabled: true
    chart: /opt/experiment-executor/charts/descheduler
    release: descheduler
    namespace: kube-system
    interval: 30s
    dryRun: false
    values:
      image:
        repository: ghcr.io/unict-cclab/descheduler
        tag: sophos-v0.0.4
        pullPolicy: IfNotPresent
    policy:
      apiVersion: "descheduler/v1alpha2"
      kind: "DeschedulerPolicy"
      maxNoOfPodsToEvictPerNode: 1
      maxNoOfPodsToEvictTotal: 1
      profiles:
        - name: "local-min-pod-lifetime"
          pluginConfig:
            - name: "DefaultEvictor"
              args:
                podProtections:
                  defaultDisabled:
                    - "PodsWithLocalStorage"
            - name: "NetworkAware"
              args:
                minPodAgeSeconds: 60
                minPodIndex: 0
                minCommunicationCost: 0
                minCostImprovement: 0
                ignoreSameZoneNetworkCost: true
                namespaces:
                  include:
                    - "local-ai"
                labelSelector:
                  matchLabels:
                    group: cluster-1
          plugins:
            deschedule:
              enabled:
                - "NetworkAware"

  application:
    name: localai
    template: ../../../benchmark-apps/localai/templates/manifest.yaml.tmpl
    namespace: local-ai
    group: cluster-1
    # schedulerName is rendered into Pods; schedulerPlugins.enabled only controls
    # whether this executor installs scheduler-plugins.
    schedulerName: default-scheduler
    proxyNodes: workers
    portbind: 8080
    p2pToken: CHANGE_ME_p2p_token
    masterHostname: ""
    useGPU: false
    numWorker: 3
    workerBasePort: 19100
    workerNodeName: ""
    workerMemoryLimitGi: 0
    proxyNodePort: 30090
    models_pvc: localai-shared-models-pvc
    backend_pvc: localai-backend-all-pvc

  chaosInjector:
    enabled: true
    nodeGroupLabel: topology.kubernetes.io/zone
    nodeSelector: nodepool=app
    networkInterface: flannel.1
    enableLatency: true
    enableBandwidth: false
    enablePacketLoss: false
    crossZoneLatency: 100ms
    crossZoneBandwidthBytesPerSecond: "1250000"
    packetLoss: "0"
    jitter: 0ms
    correlation: "0"

  loadGen:
    config:
      name: localai
      locustfile: ../../../benchmark-apps/localai/locustfile.py
      warmup_s: 10
      sample_interval_s: 1
      slo_ms: 250
      p95_window_s: 30
      pattern:
        type: mixed
        parts:
          - type: constant
            rps: 30
            duration: 5m
          - type: constant
            rps: 30
            duration: 5m
      zone_distribution:
        type: mixed
        parts:
          - type: constant
            duration: 5m
            primary_zone: zone-a
            spread: 0
          - type: linear
            duration: 5m
            primary_zone: zone-a
            start_spread: 0
            end_spread: 1
      kubernetes:
        enabled: true
        namespace: local-ai
        sample_interval_s: 5
        selector: group=cluster-1
