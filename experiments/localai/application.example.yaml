# LocalAI application fragment for tools.application in an experiment file.
application:
  name: localai
  template: ../../../benchmark-apps/localai/templates/manifest.yaml.tmpl
  namespace: local-ai
  group: cluster-1
  schedulerName: default-scheduler
  proxyNodes: workers
  portbind: 8080
  p2pToken: CHANGE_ME_p2p_token
  masterHostname: ""
  useGPU: false
  numWorker: 3
  workerBasePort: 19100
  workerNodeName: ""
  workerMemoryLimitGi: 0
  proxyNodePort: 30080
  models_pvc: localai-shared-models-pvc
  backend_pvc: localai-backend-all-pvc
